services:
  db:
    image: postgres:16
    container_name: interviewai-db
    environment:
      POSTGRES_USER: interviewai
      POSTGRES_PASSWORD: interviewai
      POSTGRES_DB: interviewai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
